---
oxidized_user: "oxidized"
oxidized_group: "oxidized"
oxidized_home: "/home/oxidized"

oxidized_listen_port: 8888
oxidized_listen_ip: 127.0.0.1
oxidized_url_prefix: ""
oxidized_vhosts: 
  - "{{ oxidized_listen_ip }}"
  - "{{ ansible_fqdn }}"
  - localhost

oxidized_required_packages:
  - ruby 
  - ruby-dev 
  - libsqlite3-dev 
  - libssl-dev 
  - pkg-config 
  - cmake 
  - libssh2-1-dev 
  - libicu-dev 
  - zlib1g-dev 
  - g++ 
  - libyaml-dev 
  - libzstd-dev

oxidized_install_web: false
oxidized_install_script: false

# Default Oxidized config. Created by running oxidized once
oxidized_use_defaults: true
oxidized_config_defaults:
  pid: "{{ oxidized_home }}/.config/oxidized/pid"
  crash:
    directory: "{{oxidized_home}}/.config/oxidized/crashes"
    hostnames: false
  stats:
    history_size: 10
  username: username
  password: password
  model: junos
  resolve_dns: true
  interval: 3600
  debug: false
  run_once: false
  threads: 30
  use_max_threads: false
  timeout: 20
  timelimit: 300
  retries: 3
  prompt: '!ruby/regexp /^([\w.@-]+[#>]\s?)$/'
  next_adds_job: false
  vars: {}
  groups: {}
  group_map: {}
  models: {}
  extensions:
    oxidized-web:
      load: "{{ oxidized_install_web }}"
      listen: "{{ oxidized_listen_ip }}"
      port: "{{ oxidized_listen_port }}"
      url_prefix: "{{ oxidized_url_prefix }}"
      vhost: "{{ oxidized_vhosts }}"
  input:
    default: ssh, telnet
    debug: false
    ssh:
      secure: false
    ftp:
      passive: true
    utf8_encoded: true
  output:
    default: file
  source:
    default: csv
  model_map:
    juniper: junos
    cisco: ios 

oxidized_config: {}

# Merge default config with user config
# User config will override default config
# Only use defaults if oxidized_use_defaults is true
_oxidized_config: "{{ (oxidized_config_defaults if oxidized_use_defaults else {}) | combine(oxidized_user_config) }}"

